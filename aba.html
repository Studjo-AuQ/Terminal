<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AbA</title>
    <link rel="stylesheet" href="style.css">    
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="index.html" target="_self" alt="Studjo Logo Arbeit und Qualifizierung">
<img src="header.jpg"></a>
        </div>
    </header>
    <main>
        <h1><b>Arbeitsbegleitende Angebote in dieser Woche (BETA)</b></h1>

        <div class="tile-grid">   
            <a href="index.html" target="_self" class="tile tile-color-11">
                <img src="back.jpg" alt="zur&uuml;ck" class="tile-img">
                <h2>Hier geht's zur&uuml;ck...</h2>
            </a>

            <a href="aba fbs.html" target="_self" class="tile tile-color-15">
                <img src="https://www.johanneswerk.de/fileadmin/_processed_/5/c/csm_Betriebsstaette_Freisenberg_Maerkische_Werkstaetten_Johanneswerk_1040b0f538.jpg" alt="FBS" class="tile-img">
                <h2>Freisenberg</h2>
            </a>

        </div>
    </main>
<div class="read-aloud-container">
        <button class="btn-read-aloud" onclick="vorlesenUndMarkieren()" title="Seite vorlesen">
            <img src="zuhoeren.jpg" alt="Ohr-Symbol">
            <span>Vorlesen</span>
        </button>
    </div>

    <footer>
        &copy; 2024 <b>Studjo | Arbeit und Qualifizierung</b> | Infoterminal | Barrierefreier Zugang
    </footer>
<script>
        let isSpeaking = false;
        let aktuelleAussage = null; 

        function vorlesenUndMarkieren() {
            if (isSpeaking || window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                entferneAlleMarkierungen();
                isSpeaking = false;
                return;
            }

            window.speechSynthesis.cancel();
            isSpeaking = true;

            const elementeZumVorlesen = [];

            const h1 = document.querySelector('h1');
            if (h1 && h1.innerText.trim() !== "") {
                elementeZumVorlesen.push({ text: h1.innerText, element: h1 });
            }

            elementeZumVorlesen.push({ text: "Hier gibt es folgende Bereiche:", element: null });

            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(tile => {
                const h2 = tile.querySelector('h2');
                if (h2 && h2.innerText.trim() !== "") {
                    elementeZumVorlesen.push({ text: h2.innerText, element: tile });
                }
            });

            if (elementeZumVorlesen.length > 0) {
                spieleSequenz(elementeZumVorlesen, 0);
            } else {
                isSpeaking = false;
            }
        }

        function spieleSequenz(elemente, index) {
            if (index >= elemente.length || !isSpeaking) {
                entferneAlleMarkierungen();
                isSpeaking = false;
                return; 
            }

            const abschnitt = elemente[index];
            
            aktuelleAussage = new SpeechSynthesisUtterance(abschnitt.text);
            aktuelleAussage.lang = 'de-DE';
            aktuelleAussage.rate = 0.9; 

            aktuelleAussage.onstart = () => {
                entferneAlleMarkierungen();
                if (abschnitt.element) {
                    abschnitt.element.classList.add('is-reading');
                }
            };

            aktuelleAussage.onend = () => {
                setTimeout(() => {
                    spieleSequenz(elemente, index + 1);
                }, 150);
            };

            aktuelleAussage.onerror = (event) => {
                console.error("Fehler beim Vorlesen:", event);
                entferneAlleMarkierungen();
                isSpeaking = false;
            };

            window.speechSynthesis.speak(aktuelleAussage);
        }

        function entferneAlleMarkierungen() {
            document.querySelectorAll('.is-reading').forEach(el => {
                el.classList.remove('is-reading');
            });
        }
    </script>
</body>
</html>
