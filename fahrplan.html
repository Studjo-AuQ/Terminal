<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bus und Bahn – einfache Fahrplanauskunft</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 30px;
        font-size: 18px;
    }
    h1 {
        font-size: 28px;
    }
    input {
        padding: 12px;
        width: 100%;
        max-width: 400px;
        font-size: 18px;
        margin-bottom: 20px;
    }
    button {
        display: block;
        width: 100%;
        max-width: 400px;
        padding: 15px;
        margin: 10px 0;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        background-color: #007acc;
        color: white;
        cursor: pointer;
    }
    button:hover {
        background-color: #005fa3;
    }
</style>
</head>
<body>

<h1>Bus und Bahn Verbindung finden</h1>

<p>Bitte geben Sie Ihre Start-Adresse ein.</p>

<input type="text" id="start" placeholder="Zum Beispiel: Meine Straße 1, Ort">

<p>Dann wählen Sie ein Ziel.</p>

<button onclick="route('Auf der Heide 24, 44803 Bochum')">Auf der Heide</button>
<button onclick="route('Dannenbaumstraße 63, 44803 Bochum')">Dannenbaumstraße</button>
<button onclick="route('Freisenbergstraße 33, 58513 Lüdenscheid')">Freisenbergstraße</button>
<button onclick="route('Wefelshohler Straße 48, 58511 Lüdenscheid')">Wefelshohler Straße</button>
<button onclick="route('Kerkhagen 22, 58513 Lüdenscheid')">Kerkhagen</button>
<button onclick="route('Am Funkenhof 1, 58566 Kierspe')">Kierspe</button>
<button onclick="route('Gewerbestraße 10, 58791 Werdohl')">Werdohl</button>

<script>
function route(ziel) {
    let start = document.getElementById("start").value;

    if (!start) {
        alert("Bitte geben Sie eine Start-Adresse ein.");
        return;
    }

    let url = "https://www.google.com/maps/dir/?api=1"
        + "&origin=" + encodeURIComponent(start)
        + "&destination=" + encodeURIComponent(ziel)
        + "&travelmode=transit";

    window.open(url, "_blank");
}
</script>

</body>
</html>
