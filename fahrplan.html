<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>VRR Fahrplanauskunft – einfache Bedienung</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 30px;
        font-size: 18px;
    }
    h1 {
        font-size: 28px;
    }
    input {
        padding: 12px;
        width: 100%;
        max-width: 400px;
        font-size: 18px;
        margin-bottom: 20px;
    }
    button {
        display: block;
        width: 100%;
        max-width: 400px;
        padding: 15px;
        margin: 10px 0;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        background-color: #009640;
        color: white;
        cursor: pointer;
    }
    button:hover {
        background-color: #007a34;
    }
</style>
</head>
<body>

<h1>Bus und Bahn im VRR</h1>

<p>Bitte gib deine Start-Adresse ein.</p>

<input type="text" id="start" placeholder="Zum Beispiel: Meine Straße 1, Ort">

<p>Dann wählen Sie ein Ziel.</p>

<button onclick="routeVRR('Auf der Heide 24, Bochum')">Auf der Heide</button>
<button onclick="routeVRR('Dannenbaumstraße 63, Bochum')">Dannenbaumstraße</button>
<button onclick="routeVRR('Freisenbergstraße 33, Lüdenscheid')">Freisenbergstraße</button>
<button onclick="routeVRR('Wefelshohler Straße 48, Lüdenscheid')">Wefelshohler Straße</button>
<button onclick="routeVRR('Kerkhagen 22, Lüdenscheid')">Kerkhagen</button>
<button onclick="routeVRR('Am Funkenhof 1, Kierspe')">Kierspe</button>
<button onclick="routeVRR('Gewerbestraße 10, Werdohl')">Werdohl</button>

<script>
function routeVRR(ziel) {
    let start = document.getElementById("start").value;

    if (!start) {
        alert("Bitte geben Sie eine Start-Adresse ein.");
        return;
    }

    let url = "https://efa.vrr.de/vrr/XSLT_TRIP_REQUEST2?"
        + "language=de"
        + "&name_origin=" + encodeURIComponent(start)
        + "&name_destination=" + encodeURIComponent(ziel);

    window.open(url, "_blank");
}
</script>

</body>
</html>
