<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Bus und Bahn – einfache Hilfe</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 30px;
        font-size: 20px;
        line-height: 1.6;
    }

    h1 {
        font-size: 30px;
        margin-bottom: 20px;
    }

    .box {
        padding: 20px;
        margin-bottom: 25px;
        border-radius: 12px;
    }

    /* Farbleitsystem */
    .start {
        background-color: #d0e7ff; /* blau */
    }

    .ziel {
        background-color: #d4f5d4; /* grün */
    }

    .aktion {
        background-color: #fff3cd; /* gelb */
    }

    img.icon {
        width: 40px;
        vertical-align: middle;
        margin-right: 10px;
    }

    input {
        padding: 15px;
        width: 100%;
        max-width: 420px;
        font-size: 20px;
        margin-top: 10px;
    }

    button {
        display: block;
        width: 100%;
        max-width: 420px;
        padding: 18px;
        margin: 12px 0;
        font-size: 20px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
    }

    .ziel-button {
        background-color: #28a745;
        color: white;
    }

    .ziel-button:hover {
        background-color: #1e7e34;
    }

    .vorlesen {
        background-color: #ffc107;
    }

</style>
</head>

<body>

<h1>
    <img src="bus.png" class="icon"> Bus und Bahn finden
</h1>

<!-- VORLESEN -->
<div class="box aktion">
    <button class="vorlesen" onclick="vorlesen()">
        🔊 Seite vorlesen
    </button>
</div>

<!-- START -->
<div class="box start">
    <p>
        <img src="start.png" class="icon">
        <b>1. Start eingeben</b>
    </p>

    <p>Wo starten Sie?</p>

    <input type="text" id="start" placeholder="Meine Adresse eingeben">
</div>

<!-- ZIEL -->
<div class="box ziel">
    <p>
        <img src="ziel.png" class="icon">
        <b>2. Ziel wählen</b>
    </p>

    <p>Wohin möchten Sie?</p>

    <button class="ziel-button" onclick="route('Auf der Heide 24, 44803 Bochum')">Auf der Heide</button>
    <button class="ziel-button" onclick="route('Dannenbaumstraße 63, 44803 Bochum')">Dannenbaumstraße</button>
    <button class="ziel-button" onclick="route('Freisenbergstraße 33, 58513 Lüdenscheid')">Freisenbergstraße</button>
    <button class="ziel-button" onclick="route('Wefelshohler Straße 48, 58511 Lüdenscheid')">Wefelshohler Straße</button>
    <button class="ziel-button" onclick="route('Kerkhagen 22, 58513 Lüdenscheid')">Kerkhagen</button>
    <button class="ziel-button" onclick="route('Am Funkenhof 1, 58566 Kierspe')">Kierspe</button>
    <button class="ziel-button" onclick="route('Gewerbestraße 10, 58791 Werdohl')">Werdohl</button>
</div>

<script>
// ROUTE
function route(ziel) {
    let start = document.getElementById("start").value;

    if (!start) {
        alert("Bitte zuerst Adresse eingeben.");
        return;
    }

    let url = "https://www.google.com/maps/dir/?api=1"
        + "&origin=" + encodeURIComponent(start)
        + "&destination=" + encodeURIComponent(ziel)
        + "&travelmode=transit";

    window.open(url, "_blank");
}

// VORLESEN
function vorlesen() {
    let text = "Bus und Bahn finden. Schritt eins: Start eingeben. Schritt zwei: Ziel wählen.";

    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "de-DE";
    speech.rate = 0.9;

    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
