// HILFSFUNKTIONEN
// =====================================================================

/** Gibt Montag der Woche zurück, in der 'datum' liegt */
function getMontag(datum) {
    const d = new Date(datum);
    const tag = d.getDay();
    const diff = (tag === 0) ? -6 : 1 - tag;
    d.setDate(d.getDate() + diff);
    d.setHours(0,0,0,0);
    return d;
}

/** KW nach ISO 8601 */
function getKW(datum) {
    const d = new Date(Date.UTC(datum.getFullYear(), datum.getMonth(), datum.getDate()));
    d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

/** Formatiert Datum als "DD.MM." */
function fmtDate(d) {
    return d.getDate().toString().padStart(2,'0') + '.' + (d.getMonth()+1).toString().padStart(2,'0') + '.';
}

/** Anzahl der vollen Wochen seit REFERENZ_DATUM */
function wochenSeitRef(montag) {
    const refMontag = getMontag(REFERENZ_DATUM);
    const diff = Math.round((montag - refMontag) / (7 * 86400000));
    return diff;
}

/** Prüft ob ein Angebot in der gegebenen Woche (Montag der Woche) stattfindet */
function findetStatt(angebot, wochenMontag) {
    if (angebot.rhythmus === 'woechentlich') return true;

    if (angebot.rhythmus === '14taegig') {
        const kw = getKW(wochenMontag);
        const istGeradeKW = (kw % 2 === 0);
        // referenzFindet: false = findet in geraden KW statt
        // referenzFindet: true  = findet in ungeraden KW statt
        return angebot.referenzFindet ? !istGeradeKW : istGeradeKW;
    }

    return false;
}

// =====================================================================

const KATEGORIE_LABELS = {
    sport:      'Sport & Bewegung',
    kreativ:    'Kreativ',
    entspan:    'Entspannung',
    bildung:    'Bildung',
    musik:      'Musik & Tanz',
    sozial:     'Gemeinschaft',
    sicherheit: 'Sicherheit',
    special:    'Besonders'
};

function renderOfferCard(angebot) {
    const zielBadge = angebot.zielgruppe === 'AuTmo'
        ? '<span class="target-badge autmo">AuTmo</span>'
        : angebot.zielgruppe === 'MontagePlus'
            ? '<span class="target-badge mopl">MontagePlus</span>'
            : angebot.zielgruppe === 'alle'
                ? '<span class="target-badge alle">Für alle</span>'
                : '';

    const anbieterHtml = angebot.anbieter
        ? `<div class="offer-anbieter">👤 ${angebot.anbieter}</div>` : '';

    const bildHtml = angebot.bild
        ? `<img src="${angebot.bild}" alt="${angebot.name}" class="offer-img">` : '';

    return `
        <div class="offer-card cat-${angebot.kategorie}">
            <div class="offer-card-inner">
                <div class="offer-card-text">
                    <div class="offer-name">${angebot.name}${zielBadge}</div>
                    <div class="offer-time">🕐 ${angebot.zeit}</div>
                    ${anbieterHtml}
                    <div class="offer-time">📍 ${angebot.treffpunkt}</div>
                    
                    <div class="offer-bottom-row">
                        <span class="offer-badge">${KATEGORIE_LABELS[angebot.kategorie] || angebot.kategorie}</span>
                        ${bildHtml}
                    </div>
                    
                </div>
            </div>
        </div>`;
}

function render() {
    const heute = new Date();
    const wochenMontag = getMontag(heute);
    const kw = getKW(heute);

    // Wochenbanner
    const freitag = new Date(wochenMontag);
    freitag.setDate(freitag.getDate() + 4);
    document.getElementById('week-badge').textContent = `KW ${kw}`;
    document.getElementById('week-dates').textContent =
        `${fmtDate(wochenMontag)} – ${fmtDate(freitag)}${freitag.getFullYear()}`;

    // Tage Mo–Fr aufbauen
    const tagNamen = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag'];
    const tagWochentag = [1, 2, 3, 4, 5];

    let daysHtml = '';
    tagNamen.forEach((tagName, idx) => {
        const wt = tagWochentag[idx];
        const tagDatum = new Date(wochenMontag);
        tagDatum.setDate(tagDatum.getDate() + idx);
        const istHeute = tagDatum.toDateString() === heute.toDateString();

        const heutigeAngebote = ANGEBOTE.filter(a => a.wochentag === wt && findetStatt(a, wochenMontag))
            .sort((a, b) => {
                const zeitA = a.zeit.split(' ')[0];
                const zeitB = b.zeit.split(' ')[0];
                return zeitA.localeCompare(zeitB);
            });

        const headerStyle = istHeute ? ' style="background-color:#8b161e;"' : '';
        const columnClass = istHeute ? 'day-column heute-column' : 'day-column';
        const anzeigeTag = istHeute ? `HEUTE: ${tagName} 🟢` : tagName;

        daysHtml += `<div class="${columnClass}">
            <div class="day-header"${headerStyle}>${anzeigeTag}<br><span style="font-size:0.8rem;font-weight:400;opacity:0.85">${fmtDate(tagDatum)}</span></div>
            <div class="day-offers">`;

        if (heutigeAngebote.length === 0) {
            daysHtml += `<div class="empty-day">Keine Angebote</div>`;
        } else {
            heutigeAngebote.forEach(a => {
                daysHtml += renderOfferCard(a);
            });
        }

        daysHtml += `</div></div>`;
    });

    document.getElementById('days-grid').innerHTML = daysHtml;

    // Sonderangebote
    let specialHtml = '';
    SONDER_ANGEBOTE.forEach(a => {
        const cardClass = 'special-card';

        const notizHtml = a.notiz
            ? `<div class="sc-note">ℹ️ ${a.notiz}</div>` : '';

        specialHtml += `
            <div class="${cardClass}">
                <h3>${a.name}
                    ${a.kategorie === 'sicherheit' ? '<span class="target-badge" style="background:#fbe9e7;color:#b71c1c">Sicherheit</span>' : ''}
                    ${a.kategorie === 'entspan'    ? '<span class="target-badge" style="background:#f3e5f5;color:#6a1b9a">Entspannung</span>' : ''}
                    ${a.kategorie === 'sozial'     ? '<span class="target-badge" style="background:#e0f2f1;color:#00695c">Gemeinschaft</span>' : ''}
                    ${a.kategorie === 'musik'      ? '<span class="target-badge" style="background:#fce4ec;color:#880e4f">Musik & Tanz</span>' : ''}
                    ${a.kategorie === 'bildung'    ? '<span class="target-badge" style="background:#e1f5fe;color:#01579b">Bildung</span>' : ''}
                </h3>
                <div class="sc-detail">
                    ${a.anbieter ? '👤 ' + a.anbieter + '<br>' : ''}
                    📍 ${a.treffpunkt}<br>
                    🗓️ ${a.info}

            </div>`;
    });

    document.getElementById('special-grid').innerHTML = specialHtml;
}

// =====================================================================
// VORLESEN
// =====================================================================
let isSpeaking = false;
let aktuelleAussage = null;

function vorlesenUndMarkieren() {
    if (isSpeaking || window.speechSynthesis.speaking) {
        window.speechSynthesis.cancel();
        entferneAlleMarkierungen();
        isSpeaking = false;
        return;
    }
    window.speechSynthesis.cancel();
    isSpeaking = true;

    const elementeZumVorlesen = [];

    // 1. Hauptüberschrift
    const h1 = document.querySelector('h1');
    if (h1) elementeZumVorlesen.push({ text: h1.innerText, element: h1 });

    // 2. Die heutige Spalte direkt und zielsicher über die CSS-Klasse greifen!
    const heuteSpalte = document.querySelector('.heute-column');

    if (heuteSpalte) {
        // Den Namen des Tages sauber auslesen (z.B. "Montag")
        let tagesName = heuteSpalte.querySelector('.day-header').innerText.split('\n')[0];
        tagesName = tagesName.replace(/🟢/g, '').replace(/HEUTE:/g, '').trim();

        // Einleitungssatz
        elementeZumVorlesen.push({ text: `Heute ist ${tagesName}. Es gibt heute folgende Angebote:`, element: null });

        // NUR die Kacheln innerhalb der heutigen Spalte suchen
        const angeboteHeute = heuteSpalte.querySelectorAll('.offer-card');

        if (angeboteHeute.length === 0) {
            elementeZumVorlesen.push({ text: 'Heute finden leider keine Angebote statt.', element: null });
        } else {
            // Angebote menschlicher und natürlicher vorlesen lassen
            angeboteHeute.forEach(card => {
                let name = card.querySelector('.offer-name')?.innerText || '';
                let zeit = card.querySelector('.offer-time')?.innerText || '';

                if (name) {
                    // 1. Das Emoji 🕐 entfernen (sonst liest der Browser heimlich "Ein Uhr" vor!)
                    zeit = zeit.replace(/🕐/g, '');
                    
                    // 2. Text säubern: "11:00 – 12:00 Uhr" -> "11:00 bis 12:00"
                    let sprechZeit = zeit.replace(/Uhr/gi, '')       // Das "Uhr" am Ende weglassen
                                         .replace(/[–-]/g, ' bis ')  // Den Strich durch "bis" ersetzen
                                         .trim();
                    
                    // 3. Doppelpunkte auflösen für natürliche Sprechweise
                    sprechZeit = sprechZeit.replace(/:00/g, ' Uhr')
                                           .replace(/:15/g, ' Uhr 15')
                                           .replace(/:30/g, ' Uhr 30')
                                           .replace(/:45/g, ' Uhr 45');

                    // 4. Satzbau umstellen (Ohne Punkt nach dem Namen, damit "2" nicht zu "Zweite" wird)
                    let sprechText = `${name} ist von ${sprechZeit}.`;

                    elementeZumVorlesen.push({ text: sprechText, element: card });
                }
            });
        }
    } else {
        // Wenn keine heute-column da ist
        elementeZumVorlesen.push({ text: 'Heute ist Wochenende. Es finden keine regelmäßigen Angebote statt.', element: null });
    }

    // 3. Vorlesen starten
    if (elementeZumVorlesen.length > 0) spieleSequenz(elementeZumVorlesen, 0);
    else isSpeaking = false;
}

function spieleSequenz(elemente, index) {
    if (index >= elemente.length || !isSpeaking) {
        entferneAlleMarkierungen();
        isSpeaking = false;
        return;
    }
    const abschnitt = elemente[index];
    aktuelleAussage = new SpeechSynthesisUtterance(abschnitt.text);
    aktuelleAussage.lang = 'de-DE';
    aktuelleAussage.rate = 0.9;
    aktuelleAussage.onstart = () => {
        entferneAlleMarkierungen();
        if (abschnitt.element) abschnitt.element.classList.add('is-reading');
    };
    aktuelleAussage.onend = () => {
        setTimeout(() => spieleSequenz(elemente, index + 1), 150);
    };
    aktuelleAussage.onerror = () => {
        entferneAlleMarkierungen();
        isSpeaking = false;
    };
    window.speechSynthesis.speak(aktuelleAussage);
}

function entferneAlleMarkierungen() {
    document.querySelectorAll('.is-reading').forEach(el => el.classList.remove('is-reading'));
}

// Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}
