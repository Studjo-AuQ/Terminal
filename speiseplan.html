<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="style.css">

<body>
    <header>
        <div class="logo-container">

        </div>

    <main>
        <h1><b>Der Speiseplan</b></h1>

<div class="read-aloud-container">
